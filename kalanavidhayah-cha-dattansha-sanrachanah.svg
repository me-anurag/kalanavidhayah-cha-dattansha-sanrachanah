<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Space -->
    <radialGradient id="space">
      <stop offset="0%" stop-color="#0b1020"></stop>
      <stop offset="60%" stop-color="#050816"></stop>
      <stop offset="100%" stop-color="#02030a"></stop>
    </radialGradient>

    <!-- Nebula -->
    <radialGradient id="nebula">
      <stop offset="0%" stop-color="#7c3aed" opacity="0.35"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>

    <!-- Spotlight -->
    <radialGradient id="spotlight">
      <stop offset="0%" stop-color="#38bdf8" opacity="0.18"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>

    <!-- NEW: cosmic energy glow -->
    <radialGradient id="energy">
      <stop offset="0%" stop-color="#38bdf8" opacity="0.25"></stop>
      <stop offset="50%" stop-color="#a78bfa" opacity="0.12"></stop>
      <stop offset="100%" stop-color="transparent"></stop>
    </radialGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6"></feGaussianBlur>
      <feMerge>
        <feMergeNode></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="420" fill="url(#space)"></rect>

  <!-- NEBULA -->
  <circle cx="300" cy="140" r="220" fill="url(#nebula)">
    <animate attributeName="cx" values="300;320;300" dur="10s" repeatCount="indefinite"></animate>
  </circle>

  <circle cx="900" cy="260" r="260" fill="url(#nebula)">
    <animate attributeName="cy" values="260;240;260" dur="12s" repeatCount="indefinite"></animate>
  </circle>

  <!-- CORE LIGHT -->
  <circle cx="600" cy="210" r="140" fill="url(#spotlight)">
    <animate attributeName="r" values="130;170;130" dur="6s" repeatCount="indefinite"></animate>
  </circle>

  <!-- ⚡ COSMIC ENERGY FLOW LINES (NEW) -->
  <path d="M0,240 C200,120 400,360 600,210 C800,60 1000,340 1200,180" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.25">
    <animate attributeName="d" dur="8s" repeatCount="indefinite" values="
      M0,240 C200,120 400,360 600,210 C800,60 1000,340 1200,180;
      M0,200 C200,320 400,120 600,260 C800,380 1000,140 1200,220;
      M0,240 C200,120 400,360 600,210 C800,60 1000,340 1200,180"></animate>
  </path>

  <!-- SECOND ENERGY FLOW -->
  <path d="M0,180 C300,300 500,80 700,220 C900,360 1100,140 1200,260" stroke="#a78bfa" stroke-width="1" fill="none" opacity="0.18">
    <animate attributeName="d" dur="10s" repeatCount="indefinite" values="
      M0,180 C300,300 500,80 700,220 C900,360 1100,140 1200,260;
      M0,240 C300,100 500,380 700,180 C900,60 1100,300 1200,220;
      M0,180 C300,300 500,80 700,220 C900,360 1100,140 1200,260"></animate>
  </path>

  <!-- ORBITS -->
  <g fill="none" stroke="#38bdf8" opacity="0.2">

    <ellipse cx="600" cy="210" rx="260" ry="110">
      <animateTransform attributeName="transform" type="rotate" from="0 600 210" to="360 600 210" dur="35s" repeatCount="indefinite"></animateTransform>
    </ellipse>

    <ellipse cx="600" cy="210" rx="320" ry="150" stroke="#a78bfa">
      <animateTransform attributeName="transform" type="rotate" from="360 600 210" to="0 600 210" dur="55s" repeatCount="indefinite"></animateTransform>
    </ellipse>

  </g>

  <!-- STARFIELD LAYER 1 -->
  <g fill="#94a3b8" opacity="0.35">
    <circle cx="80" cy="60" r="1"></circle>
    <circle cx="180" cy="140" r="1"></circle>
    <circle cx="260" cy="80" r="1"></circle>
    <circle cx="340" cy="200" r="1"></circle>
    <circle cx="420" cy="120" r="1"></circle>
    <circle cx="520" cy="90" r="1"></circle>
    <circle cx="620" cy="160" r="1"></circle>
    <circle cx="720" cy="110" r="1"></circle>
    <circle cx="820" cy="190" r="1"></circle>
    <circle cx="920" cy="140" r="1"></circle>
    <circle cx="1020" cy="220" r="1"></circle>
    <circle cx="1120" cy="120" r="1"></circle>
  </g>

  <!-- STARFIELD LAYER 2 -->
  <g fill="#cbd5e1">
    <circle cx="150" cy="200" r="1.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"></animate>
    </circle>

    <circle cx="480" cy="260" r="1.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"></animate>
    </circle>

    <circle cx="760" cy="80" r="1.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.8s" repeatCount="indefinite"></animate>
    </circle>

    <circle cx="980" cy="300" r="1.5">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3.5s" repeatCount="indefinite"></animate>
    </circle>
  </g>

  <!-- CORE SPARK PARTICLES -->
  <g fill="#7dd3fc" opacity="0.7">

    <circle cx="250" cy="300" r="2"></circle>
    <circle cx="400" cy="280" r="2"></circle>
    <circle cx="600" cy="320" r="2"></circle>
    <circle cx="780" cy="290" r="2"></circle>
    <circle cx="950" cy="310" r="2"></circle>

  </g>

  <!-- SANSKRIT TEXT -->
  <text x="50%" y="48%" text-anchor="middle" font-size="56" fill="#ffffff" font-family="serif" font-weight="800" filter="url(#glow)">

    कलनविधयः च दत्तांशसंरचनाः

  </text>

  <!-- TRANSLITERATION -->
  <text x="50%" y="58%" text-anchor="middle" font-size="20" fill="#cbd5e1" font-family="monospace">

    Kalanavidhayah cha Dattansha Sanrachana

  </text>

  <!-- BOTTOM LINE -->
  <text x="50%" y="70%" text-anchor="middle" font-size="16" fill="#ffffff" font-family="sans-serif" font-weight="700" letter-spacing="2">

    Algorithms • Data Structures • Creation

  </text>

</svg>